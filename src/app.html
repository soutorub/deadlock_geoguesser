<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
			crossorigin="anonymous"
		/>
		%sveltekit.head%
		<style>
			:root {
				--app-color-bg: #0a0d0b;
				--app-color-surface: #101511;
				--app-color-surface-alt: #151b16;
				--app-color-surface-deep: #0b0f0c;
				--app-color-text: #dce7df;
				--app-color-text-muted: #9baa9e;
				--app-color-accent: #8bc53f;
				--app-color-accent-rgb: 139, 197, 63;
				--app-color-accent-soft: #c7d36f;
				--app-color-accent-soft-rgb: 199, 211, 111;
				--app-color-accent-contrast: #0b0e0c;
				--app-color-accent-contrast-border: rgba(11, 14, 12, 0.5);
				--app-color-highlight: #eff5e8;
				--app-color-code: #d9e18c;
				--app-color-border-soft: rgba(209, 232, 183, 0.12);
				--app-color-border: rgba(194, 219, 184, 0.24);
				--app-color-border-strong: rgba(208, 232, 192, 0.48);
				--app-color-accent-fill: rgba(var(--app-color-accent-soft-rgb), 0.12);
				--app-color-accent-fill-strong: rgba(var(--app-color-accent-soft-rgb), 0.18);
				--app-color-accent-border: rgba(var(--app-color-accent-soft-rgb), 0.34);
				--app-color-accent-border-strong: rgba(var(--app-color-accent-soft-rgb), 0.55);

				--bs-body-bg: var(--app-color-bg);
				--bs-body-color: var(--app-color-text);
				--bs-success: var(--app-color-accent);
				--bs-success-rgb: var(--app-color-accent-rgb);
				--bs-secondary-bg: var(--app-color-surface);
				--bs-tertiary-bg: var(--app-color-surface-deep);
				--bs-dark-bg-subtle: var(--app-color-surface-alt);
				--bs-border-color: var(--app-color-border);
				--bs-card-bg: var(--app-color-surface);
				--bs-dark-rgb: 10, 13, 11;
			}

			html {
				font-size: clamp(19px, 1vw + 14px, 24px);
			}

			body {
				min-height: 100vh;
				font-family:
					"IBM Plex Sans",
					"Segoe UI",
					Roboto,
					sans-serif;
				color: var(--app-color-text);
			}

			*,
			*::before,
			*::after {
				box-sizing: border-box;
			}

			.card,
			.table,
			.form-select,
			.form-control,
			.btn,
			.nav-pills .nav-link,
			.badge {
				border-radius: 0;
			}

			.table {
				--bs-table-bg: transparent;
				--bs-table-color: var(--app-color-text);
				--bs-table-border-color: var(--app-color-border-soft);
				font-size: 1rem;
			}

			.app-panel-card {
				background: rgba(16, 21, 17, 0.92);
				border: 1px solid var(--app-color-border) !important;
			}

			.app-stat-card {
				background: var(--app-color-surface-alt) !important;
				border: 1px solid var(--app-color-border) !important;
			}

			.app-section-title {
				margin: 0 0 1rem;
				font-size: clamp(1.9rem, 1.2vw + 1.2rem, 2.6rem);
				line-height: 1.05;
			}

			.app-copy {
				margin: 0;
				font-size: 1.18rem;
				line-height: 1.6;
				color: var(--app-color-text-muted);
			}

			.btn {
				font-weight: 600;
				letter-spacing: 0.015em;
				min-height: 4rem;
				font-size: 1.3rem;
			}

			.app-button-block {
				width: 100%;
			}

			.btn-success {
				background-color: var(--app-color-accent);
				border-color: var(--app-color-accent);
				color: var(--app-color-accent-contrast);
			}

			.btn-success:hover,
			.btn-success:focus {
				background-color: #98d14a;
				border-color: #98d14a;
				color: var(--app-color-accent-contrast);
			}

			.btn-outline-success {
				color: var(--app-color-accent-soft);
				border-color: var(--app-color-accent-border);
			}

			.btn-outline-success:hover,
			.btn-outline-success:focus {
				background-color: rgba(var(--app-color-accent-soft-rgb), 0.1);
				color: var(--app-color-highlight);
				border-color: var(--app-color-accent-border-strong);
			}

			.form-control,
			.form-select {
				min-height: 3.5rem;
				font-size: 1rem;
				background: var(--app-color-surface-deep);
				border-color: var(--app-color-border);
				color: var(--app-color-text);
			}

			.form-control::placeholder,
			.form-select::placeholder {
				color: var(--app-color-text-muted);
			}

			.form-control:focus,
			.form-select:focus {
				background: var(--app-color-surface-deep);
				border-color: var(--app-color-accent-border-strong);
				color: var(--app-color-text);
				box-shadow: none;
			}

			textarea.form-control {
				min-height: 8rem;
			}

			code {
				color: var(--app-color-code);
				font-size: 0.95em;
			}

			.app-eyebrow {
				text-transform: uppercase;
				font-weight: 700;
				letter-spacing: 0.08em;
				color: var(--app-color-accent);
			}

			.app-inline-alert {
				margin: 0;
				padding: 0.65rem 0.8rem;
			}

			.app-table-wrap {
				margin-top: 1.35rem;
				overflow-x: auto;
			}

			.app-root {
				display: contents;
			}
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div class="app-root">%sveltekit.body%</div>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
			crossorigin="anonymous"
		></script>
	</body>
</html>
