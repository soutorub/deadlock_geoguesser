<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
			crossorigin="anonymous"
		/>
		%sveltekit.head%
		<style>
			:root {
				--bs-body-bg: #08110c;
				--bs-body-color: #d6f5df;
				--bs-success: #3ddc84;
				--bs-success-rgb: 61, 220, 132;
				--bs-secondary-bg: #102018;
				--bs-tertiary-bg: #0d1712;
				--bs-dark-bg-subtle: #16231b;
				--bs-border-color: rgba(61, 220, 132, 0.24);
				--bs-card-bg: rgba(10, 18, 13, 0.92);
				--bs-dark-rgb: 8, 17, 12;
				--app-panel: rgba(11, 23, 16, 0.92);
				--app-panel-soft: rgba(18, 33, 24, 0.9);
			}

			body {
				min-height: 100vh;
				background:
					radial-gradient(circle at top left, rgba(61, 220, 132, 0.12), transparent 30%),
					radial-gradient(circle at top right, rgba(61, 220, 132, 0.06), transparent 28%),
					radial-gradient(circle at bottom center, rgba(24, 92, 54, 0.12), transparent 32%),
					linear-gradient(180deg, #06100b 0%, #09150f 45%, #050906 100%);
				background-attachment: fixed;
			}

			.card,
			.table,
			.form-select,
			.form-control,
			.btn,
			.nav-pills .nav-link,
			.badge {
				border-radius: 1rem;
			}

			.form-control,
			.form-select {
				background-color: rgba(9, 18, 13, 0.95);
				color: #d6f5df;
				border-color: rgba(61, 220, 132, 0.24);
			}

			.form-control:focus,
			.form-select:focus {
				background-color: rgba(9, 18, 13, 0.98);
				color: #effff4;
				border-color: rgba(61, 220, 132, 0.5);
				box-shadow: 0 0 0 0.25rem rgba(61, 220, 132, 0.15);
			}

			.table {
				--bs-table-bg: transparent;
				--bs-table-color: #d6f5df;
				--bs-table-border-color: rgba(61, 220, 132, 0.18);
			}

			.bg-dark-subtle {
				background-color: #16231b !important;
			}

			.text-muted,
			.text-body-secondary {
				color: #91b39e !important;
			}
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
			crossorigin="anonymous"
		></script>
	</body>
</html>
