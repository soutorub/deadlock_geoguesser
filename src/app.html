<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
			crossorigin="anonymous"
		/>
		%sveltekit.head%
		<style>
			:root {
				--bs-body-bg: #0a0d0b;
				--bs-body-color: #d9e4dc;
				--bs-success: #7fbf3f;
				--bs-success-rgb: 127, 191, 63;
				--bs-secondary-bg: #101511;
				--bs-tertiary-bg: #0c100d;
				--bs-dark-bg-subtle: #151b16;
				--bs-border-color: rgba(175, 204, 164, 0.24);
				--bs-card-bg: #101511;
				--bs-dark-rgb: 10, 13, 11;
				--app-bg: #0a0d0b;
				--app-panel: #101511;
				--app-panel-soft: #151b16;
				--app-line: rgba(194, 219, 184, 0.24);
				--app-line-strong: rgba(208, 232, 192, 0.48);
				--app-accent: #8bc53f;
				--app-accent-soft: #c7d36f;
				--app-text: #dce7df;
				--app-muted: #9baa9e;
				--app-shadow: 0 0 0 1px rgba(0, 0, 0, 0.18);
			}

			html {
				font-size: clamp(19px, 1vw + 14px, 24px);
			}

			body {
				min-height: 100vh;
				font-family:
					"IBM Plex Sans",
					"Segoe UI",
					Roboto,
					sans-serif;
				color: var(--app-text);
			}

			*,
			*::before,
			*::after {
				box-sizing: border-box;
			}

			.card,
			.table,
			.form-select,
			.form-control,
			.btn,
			.nav-pills .nav-link,
			.badge {
				border-radius: 0;
			}

			.table {
				--bs-table-bg: transparent;
				--bs-table-color: var(--app-text);
				--bs-table-border-color: rgba(209, 232, 183, 0.12);
				font-size: 1rem;
			}


			.app-panel-card {
				background: rgba(16, 21, 17, 0.92);
				border: 1px solid var(--app-line) !important;
			}

			.app-stat-card {
				background: var(--app-panel-soft) !important;
				border: 1px solid var(--app-line) !important;
			}

			.btn {
				font-weight: 600;
				letter-spacing: 0.015em;
				min-height: 4rem;
				font-size: 1.3rem;
			}

			.btn-success {
				background-color: var(--app-accent);
				border-color: var(--app-accent);
				color: #0b0e0c;
			}

			.btn-success:hover,
			.btn-success:focus {
				background-color: #98d14a;
				border-color: #98d14a;
				color: #0b0e0c;
			}

			.btn-outline-success {
				color: #c6dca9;
				border-color: rgba(198, 220, 169, 0.38);
			}

			.btn-outline-success:hover,
			.btn-outline-success:focus {
				background-color: rgba(198, 220, 169, 0.1);
				color: #eff5e8;
				border-color: rgba(198, 220, 169, 0.6);
			}

			code {
				color: #d9e18c;
				font-size: 0.95em;
			}

			.app-eyebrow {
				text-transform: uppercase;
				font-weight: 700;
				color: var(--app-accent);
			}
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
			crossorigin="anonymous"
		></script>
	</body>
</html>
